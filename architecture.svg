<svg width="860" viewBox="0 0 860 760" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="760" fill="#0f172a" rx="12"/>

  <!-- Cluster border -->
  <rect x="20" y="20" width="820" height="720" rx="12" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="8 4"/>
  <rect x="20" y="20" width="222" height="26" rx="4" fill="#1e293b"/>
  <text x="32" y="37" font-size="12" fill="#94a3b8" font-weight="600" letter-spacing="0.5">KIND KUBERNETES CLUSTER</text>
  <text x="32" y="56" font-size="11" fill="#475569">fraud-detection namespace</text>

  <!-- ─── PRODUCER ─── -->
  <rect x="300" y="72" width="260" height="62" rx="8" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="430" y="98" font-size="13" fill="#c4b5fd" font-weight="700" text-anchor="middle">Transaction Producer</text>
  <text x="430" y="116" font-size="11" fill="#8b5cf6" text-anchor="middle">20 TPS · 200 accounts · 2% base fraud rate</text>

  <!-- Producer → Kafka -->
  <line x1="430" y1="134" x2="430" y2="166" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── KAFKA RAW ─── -->
  <rect x="300" y="170" width="260" height="62" rx="8" fill="#1c1917" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="196" font-size="13" fill="#fcd34d" font-weight="700" text-anchor="middle">Apache Kafka</text>
  <text x="430" y="214" font-size="11" fill="#f59e0b" text-anchor="middle">topic: raw-transactions</text>

  <!-- Kafka → Flink -->
  <line x1="430" y1="232" x2="430" y2="264" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── FLINK ─── -->
  <rect x="80" y="268" width="700" height="84" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1.5"/>
  <text x="430" y="294" font-size="13" fill="#5eead4" font-weight="700" text-anchor="middle">Apache Flink 1.18  ·  JobManager + TaskManager</text>
  <text x="430" y="312" font-size="11" fill="#2dd4bf" text-anchor="middle">KafkaSource  →  WatermarkStrategy  →  keyBy(account_id)  →  FraudDetector (RocksDB)</text>
  <text x="430" y="330" font-size="11" fill="#2dd4bf" text-anchor="middle">→  ParseScoredJson  →  fraud_input_view  →  StatementSet.execute()</text>

  <!-- Flink fan-out labels -->
  <text x="185" y="376" font-size="10" fill="#475569" text-anchor="middle">all records</text>
  <text x="430" y="376" font-size="10" fill="#475569" text-anchor="middle">fraud only</text>
  <text x="685" y="376" font-size="10" fill="#475569" text-anchor="middle">all records · S3FileIO</text>

  <!-- Flink → enriched -->
  <path d="M 240 352 L 240 390 L 152 390 L 152 418" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Flink → fraud-alerts -->
  <line x1="430" y1="352" x2="430" y2="418" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Flink → Iceberg -->
  <path d="M 620 352 L 620 390 L 710 390 L 710 418" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ─── SINKS ROW ─── -->
  <!-- Sink: enriched-transactions -->
  <rect x="52" y="422" width="200" height="62" rx="8" fill="#1c1917" stroke="#d97706" stroke-width="1.5"/>
  <text x="152" y="448" font-size="12" fill="#fcd34d" font-weight="700" text-anchor="middle">Kafka</text>
  <text x="152" y="466" font-size="10" fill="#f59e0b" text-anchor="middle">enriched-transactions</text>
  <text x="152" y="480" font-size="10" fill="#78716c" text-anchor="middle">AT_LEAST_ONCE</text>

  <!-- Sink: fraud-alerts -->
  <rect x="330" y="422" width="200" height="62" rx="8" fill="#1c1917" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="448" font-size="12" fill="#fcd34d" font-weight="700" text-anchor="middle">Kafka</text>
  <text x="430" y="466" font-size="10" fill="#f59e0b" text-anchor="middle">fraud-alerts</text>
  <text x="430" y="480" font-size="10" fill="#78716c" text-anchor="middle">AT_LEAST_ONCE</text>

  <!-- Sink: Iceberg REST Catalog -->
  <rect x="608" y="422" width="212" height="62" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="714" y="448" font-size="12" fill="#93c5fd" font-weight="700" text-anchor="middle">Iceberg REST Catalog</text>
  <text x="714" y="466" font-size="10" fill="#60a5fa" text-anchor="middle">tabulario/iceberg-rest</text>
  <text x="714" y="480" font-size="10" fill="#1d4ed8" text-anchor="middle">fraud_catalog.fraud_db</text>

  <!-- Iceberg → MinIO -->
  <line x1="714" y1="484" x2="714" y2="536" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ─── MINIO ─── -->
  <rect x="608" y="540" width="212" height="82" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="714" y="563" font-size="12" fill="#93c5fd" font-weight="700" text-anchor="middle">MinIO  (S3-compatible)</text>
  <text x="714" y="581" font-size="10" fill="#60a5fa" text-anchor="middle">fraud-warehouse/iceberg/</text>
  <text x="714" y="596" font-size="10" fill="#60a5fa" text-anchor="middle">  fraud_db/fraud_scores/</text>
  <text x="714" y="611" font-size="10" fill="#60a5fa" text-anchor="middle">fraud-checkpoints/flink/</text>

  <!-- MinIO → Trino -->
  <line x1="714" y1="622" x2="714" y2="654" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ─── TRINO ─── -->
  <rect x="608" y="658" width="212" height="62" rx="8" fill="#0c1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="714" y="682" font-size="12" fill="#93c5fd" font-weight="700" text-anchor="middle">Trino</text>
  <text x="714" y="700" font-size="10" fill="#60a5fa" text-anchor="middle">Iceberg connector</text>
  <text x="714" y="714" font-size="10" fill="#1d4ed8" text-anchor="middle">SELECT * FROM fraud_scores</text>

  <!-- ─── OBSERVABILITY ─── -->
  <rect x="52" y="548" width="526" height="72" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="315" y="572" font-size="12" fill="#9ca3af" font-weight="700" text-anchor="middle">Observability Stack</text>
  <text x="315" y="591" font-size="11" fill="#6b7280" text-anchor="middle">Prometheus  ·  Grafana  ·  Flink Web UI  ·  Kafka UI  ·  MinIO Console  ·  Schema Registry</text>
  <text x="315" y="609" font-size="10" fill="#4b5563" text-anchor="middle">:9090  ·  :3000  ·  :8082  ·  :8080  ·  :9001</text>

  <!-- Dead-letter sink (small badge) -->
  <rect x="52" y="666" width="180" height="54" rx="8" fill="#1c1917" stroke="#44403c" stroke-width="1"/>
  <text x="142" y="688" font-size="12" fill="#a8a29e" font-weight="700" text-anchor="middle">Kafka</text>
  <text x="142" y="706" font-size="10" fill="#78716c" text-anchor="middle">dead-letter  ·  error handler</text>

  <!-- Legend -->
  <rect x="278" y="666" width="300" height="54" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="290" y="682" width="10" height="10" rx="2" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="305" y="692" font-size="10" fill="#9ca3af">Ingestion</text>
  <rect x="358" y="682" width="10" height="10" rx="2" fill="#1c1917" stroke="#d97706" stroke-width="1.5"/>
  <text x="373" y="692" font-size="10" fill="#9ca3af">Kafka</text>
  <rect x="420" y="682" width="10" height="10" rx="2" fill="#042f2e" stroke="#0d9488" stroke-width="1.5"/>
  <text x="435" y="692" font-size="10" fill="#9ca3af">Flink</text>
  <rect x="480" y="682" width="10" height="10" rx="2" fill="#0c1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="495" y="692" font-size="10" fill="#9ca3af">Storage / Analytics</text>
  <line x1="290" y1="710" x2="316" y2="710" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="714" font-size="10" fill="#9ca3af">Data flow</text>
  <line x1="400" y1="710" x2="426" y2="710" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="430" y="714" font-size="10" fill="#9ca3af">Storage path</text>
</svg>
